<style>
:root{--bg:#0a0a0a;--card:#161616;--border:#2a2a2a;--accent:#c8a96e;--text:#e8e0d5;--muted:#555;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300;padding:60px 24px 100px;}
.wrap{max-width:960px;margin:0 auto;}
header{text-align:center;margin-bottom:40px;}
header::after{content:'';display:block;width:50px;height:1px;background:var(--accent);margin:18px auto 0;}
h1{font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:300;letter-spacing:.12em;line-height:1;}
h1 em{color:var(--accent);font-style:italic;}
.subtitle{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:10px;}
.liked-bar{text-align:center;margin-bottom:50px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
.liked-bar span{color:var(--accent);font-weight:400;}
.shop-section{margin-bottom:60px;}
.shop-header{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.shop-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;letter-spacing:.07em;}
.badge-new{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);padding:2px 8px;font-family:'Montserrat',sans-serif;}
.shop-count{font-size:10px;color:var(--muted);margin-left:auto;letter-spacing:.08em;}
.cat-section{margin-bottom:24px;}
.cat-label{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:#888;margin-bottom:10px;padding-left:2px;font-weight:400;}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.item-card{background:var(--card);border:1px solid var(--border);overflow:hidden;transition:border-color .25s,transform .25s;color:inherit;display:block;position:relative;cursor:pointer;}
.item-card:hover{border-color:#444;transform:translateY(-2px);}
.item-card.liked{border-color:var(--accent);}
.thumb-wrap{width:100%;aspect-ratio:3/4;background:#1c1c1c;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .3s;}
.item-card:hover .thumb-wrap img{transform:scale(1.03);}
.like-btn{position:absolute;top:7px;right:7px;width:28px;height:28px;background:rgba(0,0,0,0.55);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;z-index:2;border:none;cursor:pointer;}
.like-btn:active{transform:scale(0.88);}
.like-btn svg{width:13px;height:13px;transition:fill .2s,stroke .2s;}
.item-card.liked .like-btn{background:rgba(200,169,110,0.25);}
.item-card.liked .like-btn svg{fill:#c8a96e;stroke:#c8a96e;}
.shop-link{position:absolute;inset:0;z-index:1;}
.item-info{padding:8px 10px 11px;}
.item-name{font-size:10px;letter-spacing:.04em;line-height:1.5;font-weight:400;}
.liked-tag{display:none;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-top:3px;}
.item-card.liked .liked-tag{display:block;}
.share-btn{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:transparent;color:var(--accent);border:1px solid var(--accent);padding:13px 28px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:400;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;z-index:100;transition:background .2s,color .2s;white-space:nowrap;}
.share-btn:hover{background:var(--accent);color:#000;}
footer{text-align:center;margin-top:60px;padding-top:24px;border-top:1px solid var(--border);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
@media(max-width:600px){h1{font-size:44px;}.items-grid{grid-template-columns:repeat(2,1fr);gap:8px;}.share-btn{left:16px;right:16px;transform:none;text-align:center;}}
</style>

let globalIdx=0;
shops.forEach(function(shop){

    const c=item.cat||'Sonstiges';

    catMap[c].push(item);
  });
  const sortedCats=Object.keys(catMap).sort(function(a,b){
    const ai=CAT_ORDER.indexOf(a),bi=CAT_ORDER.indexOf(b);
    return(ai===-1?99:ai)-(bi===-1?99:bi);
  });
  sec.innerHTML='<div class="shop-header"><span class="shop-name">'+shop.name+'</span>'+(shop.isNew?'<span class="badge-new">Neu</span>':'')+'<span class="shop-count">'+shop.items.length+' Artikel</span></div>';
  sortedCats.forEach(function(catName){
